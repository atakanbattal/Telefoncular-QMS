[dev]
  command = "npm run dev"
  targetPort = 3003
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# SPA: Önce hash'li asset'ler (uzun önbellek), sonra shell — eski index.html + yeni deploy = boş sayfa / MIME hatası
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate, max-age=0"
    Pragma = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate, max-age=0"

# Diğer kök dosyalar (favicon vb.) — kısa önbellek; gereksiz eski shell riskini azaltır
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

